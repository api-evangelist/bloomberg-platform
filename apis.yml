aid: bloomberg-platform
name: Bloomberg Platform
description: The Bloomberg Platform is the integrated technology infrastructure underpinning
  all Bloomberg professional products and services. It encompasses the data distribution
  network, cloud and on-premises deployment options, API connectivity layer, identity
  and access management, and enterprise integration capabilities that connect Bloomberg
  data and analytics to client systems.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bloomberg-platform/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-21'
specificationVersion: '0.19'
tags:
- Platform
- Infrastructure
- Data Distribution
- API Gateway
- Integration
- Bloomberg
apis:
- aid: bloomberg-platform:blpapi
  name: Bloomberg Open API (BLPAPI)
  description: The foundational API layer of the Bloomberg Platform providing real-time,
    reference, and historical data access through a socket-based protocol with SDKs
    for multiple programming languages.
  humanURL: https://bloomberg.github.io/blpapi-docs/
  baseURL: blpapi://localhost:8194
  tags:
  - Core API
  - Market Data
  - Platform API
  properties:
  - type: Documentation
    url: https://bloomberg.github.io/blpapi-docs/
  - type: GitHubRepository
    url: https://github.com/bloomberg/blpapi-node
- aid: bloomberg-platform:bloomberg-cloud-api
  name: Bloomberg Cloud Connect
  description: Cloud-native connectivity to Bloomberg data enabling access from AWS,
    Azure, and Google Cloud environments without on-premises Bloomberg infrastructure.
  humanURL: https://www.bloomberg.com/professional/solution/cloud/
  baseURL: https://api.bloomberg.com/cloud
  tags:
  - Cloud
  - AWS
  - Azure
  - Google Cloud
  - Cloud Native
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/cloud/
- aid: bloomberg-platform:bloomberg-identity-api
  name: Bloomberg Identity and Access Management
  description: Authentication and authorization services for the Bloomberg Platform
    providing entitlement management, user authentication, and access control for
    Bloomberg data and applications.
  humanURL: https://www.bloomberg.com/professional/support/api-library/
  baseURL: https://auth.bloomberg.com
  tags:
  - Authentication
  - Authorization
  - Identity
  - Entitlements
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/support/api-library/
